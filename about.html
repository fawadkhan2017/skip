<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKIP - About Us</title>
    <meta name="description" content="Learn more about Skip Laundry, our values, and the team that gives you your time back.">

    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary: #FFD200;
            --primary-hover: #E5BD00;
            --bg-off-white: #FAFAFA;
            --text-main: #000000;
            --text-gray: #4B5563;
            --footer-bg: #141824;
        }
    }

    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4, h5, h6 {
            letter-spacing: -0.02em;
        }
    }

    @layer components {
        .container-custom {
            @apply max-w-[1100px] mx-auto px-5;
        }
        .btn-primary {
            @apply inline-flex items-center justify-center px-8 py-4 text-[17px] font-bold rounded-full text-black bg-[var(--primary)] hover:bg-[var(--primary-hover)] transition-all duration-200;
        }
        .btn-white {
            @apply inline-flex items-center justify-center px-8 py-4 text-[17px] font-bold rounded-full text-black bg-white hover:bg-gray-100 transition-all duration-200;
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/AboutHero.js"></script>
    <script type="text/babel" src="components/Problem.js"></script>
    <script type="text/babel" src="components/Values.js"></script>
    <script type="text/babel" src="components/HowItWorks.js"></script>
    <script type="text/babel" src="components/Team.js"></script>
    <script type="text/babel" src="components/FooterBanner.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="about-app.js"></script>
</body>
</html>
